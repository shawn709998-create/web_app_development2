{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-primary text-white pt-3 pb-3">
                <h5 class="mb-0 fw-bold">設定總預算</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('budget.save') }}">
                    <div class="mb-4">
                        <label for="month" class="form-label text-muted small fw-bold">目標月份 <span class="text-danger">*</span></label>
                        <input type="month" class="form-control" id="month" name="month" required value="{{ current_budgets[0].month if current_budgets else '' }}">
                    </div>
                    <div class="mb-4">
                        <label for="amount" class="form-label text-muted small fw-bold">預算金額 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" min="0" class="form-control" id="amount" name="amount" required value="{{ current_budgets[0].amount if current_budgets else '' }}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">儲存設定</button>
                </form>
                <script>
                    // 若無值，預設為當月
                    document.addEventListener('DOMContentLoaded', () => {
                        const monthInput = document.getElementById('month');
                        if (!monthInput.value) {
                            const today = new Date();
                            const y = today.getFullYear();
                            const m = String(today.getMonth() + 1).padStart(2, '0');
                            monthInput.value = `${y}-${m}`;
                        }
                    });
                </script>
            </div>
        </div>
    </div>
    
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pt-4 pb-2 border-bottom-0">
                <h5 class="mb-0 fw-bold">歷史預算紀錄</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">月份</th>
                            <th class="text-end pe-4">設定金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for b in budgets %}
                        <tr>
                            <td class="ps-4">{{ b.month }}</td>
                            <td class="text-end pe-4 fw-bold">${{ "%.0f"|format(b.amount) }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center text-muted py-5">尚未設定任何預算</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
